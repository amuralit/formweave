<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FormWeave — Live Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #f4f4f5;
      padding: 40px 20px;
      min-height: 100vh;
    }
    .demo-grid {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 420px));
      gap: 28px;
      justify-content: center;
      align-items: start;
    }
    .demo-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .demo-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #999;
    }
    h1 {
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      color: #222;
      margin-bottom: 4px;
    }
    .subtitle {
      text-align: center;
      color: #999;
      font-size: 13px;
      margin-bottom: 32px;
    }
  </style>
</head>
<body>
  <h1>FormWeave — Live Component Demo</h1>
  <p class="subtitle">Real React components rendering from JSON Schema at runtime</p>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
